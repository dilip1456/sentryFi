name: Build Android APK

on:
  # Only build APK when Android or app-critical files change
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'capacitor.config.ts'
      - 'vite.config.ts'
  # Or trigger manually
  workflow_dispatch:

# Skip if commit message contains [skip apk]
concurrency:
  group: apk-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    # Skip doc/config-only changes
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip apk]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build web bundle
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android --inline

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"
          KEYSTORE_PATH: "sentryfi-release.keystore"
          KEYSTORE_ALIAS: "sentryfi-release"
          KEYSTORE_STORE_PASSWORD: "SentryFi2026!"
          KEYSTORE_KEY_PASSWORD: "SentryFi2026!"

      - name: Copy APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK ($(du -sh $APK | cut -f1))"
          mkdir -p public/downloads
          cp "$APK" public/downloads/SentryFi.apk

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/SentryFi.apk
          if git diff --cached --quiet; then
            echo "APK unchanged"
          else
            VERSION=$(node -p "require('./package.json').version")
            git commit -m "chore: APK v${VERSION} [skip ci]"
            git push
          fi
