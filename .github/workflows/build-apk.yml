name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build web bundle
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android --inline

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | tr -d ' \n\r\t' | base64 -d > android/app/sentryfi-release.keystore
            echo "Keystore decoded: $(wc -c < android/app/sentryfi-release.keystore) bytes"
            echo "KEYSTORE_AVAILABLE=true" >> $GITHUB_ENV
          else
            echo "No keystore secret found, using debug signing"
            echo "KEYSTORE_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"
          KEYSTORE_PATH: "sentryfi-release.keystore"
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Copy APK to public/downloads
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found: $APK"
          mkdir -p public/downloads
          cp "$APK" public/downloads/SentryFi.apk
          ls -lh public/downloads/SentryFi.apk

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/SentryFi.apk
          if git diff --cached --quiet; then
            echo "APK unchanged"
          else
            VERSION=$(node -p "require('./package.json').version")
            git commit -m "chore: update APK v${VERSION} [skip ci]"
            git push
          fi
