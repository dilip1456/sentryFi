name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build web bundle
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android --inline

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      - name: Find and copy APK
        run: |
          echo "=== APK files produced ==="
          find android/app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APKs found"
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No release APK found"
            exit 1
          fi
          echo "Using: $APK_PATH"
          mkdir -p public/downloads
          cp "$APK_PATH" public/downloads/SentryFi.apk
          ls -lh public/downloads/SentryFi.apk

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/SentryFi.apk
          if git diff --cached --quiet; then
            echo "APK unchanged"
          else
            git commit -m "chore: auto-rebuild Android APK [skip ci]"
            git push
          fi
